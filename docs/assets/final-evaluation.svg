<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Avaliacao final aprovada</title>
  <desc id="desc">Resumo visual da rodada final de avaliacao do prompt bug_to_user_story_v2 com todas as metricas acima de 0.9.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08131d" />
      <stop offset="100%" stop-color="#10263a" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071018" />
      <stop offset="100%" stop-color="#0b1724" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="70" y="60" width="1260" height="780" rx="28" fill="url(#panel)" stroke="#1d3a52" stroke-width="2" filter="url(#shadow)"/>

  <text x="120" y="130" fill="#90f0d0" font-family="Menlo, Consolas, monospace" font-size="26">AVALIACAO DE PROMPTS OTIMIZADOS</text>
  <text x="120" y="175" fill="#b6cfe0" font-family="Menlo, Consolas, monospace" font-size="22">Prompt avaliado: rodrigo-romanzini/bug_to_user_story_v2</text>
  <text x="120" y="210" fill="#b6cfe0" font-family="Menlo, Consolas, monospace" font-size="22">Data da rodada final: 2026-05-04</text>

  <text x="120" y="290" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="24">Metricas Derivadas</text>
  <text x="120" y="335" fill="#e8fff7" font-family="Menlo, Consolas, monospace" font-size="32">Helpfulness: 0.92  ✓</text>
  <text x="120" y="380" fill="#e8fff7" font-family="Menlo, Consolas, monospace" font-size="32">Correctness: 0.90  ✓</text>

  <text x="120" y="470" fill="#67e8f9" font-family="Menlo, Consolas, monospace" font-size="24">Metricas Base</text>
  <text x="120" y="515" fill="#e8fff7" font-family="Menlo, Consolas, monospace" font-size="32">F1-Score: 0.90  ✓</text>
  <text x="120" y="560" fill="#e8fff7" font-family="Menlo, Consolas, monospace" font-size="32">Clarity: 0.94  ✓</text>
  <text x="120" y="605" fill="#e8fff7" font-family="Menlo, Consolas, monospace" font-size="32">Precision: 0.91  ✓</text>

  <line x1="120" y1="660" x2="1280" y2="660" stroke="#28475f" stroke-width="2"/>
  <text x="120" y="720" fill="#fde68a" font-family="Menlo, Consolas, monospace" font-size="34">MEDIA GERAL: 0.9142</text>
  <text x="120" y="780" fill="#86efac" font-family="Menlo, Consolas, monospace" font-size="38">STATUS: APROVADO - todas as metricas &gt;= 0.9</text>

  <rect x="995" y="255" width="245" height="355" rx="22" fill="#0e2234" stroke="#24455f" stroke-width="2"/>
  <text x="1035" y="315" fill="#b6cfe0" font-family="Menlo, Consolas, monospace" font-size="22">Dataset</text>
  <text x="1035" y="350" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="28">15 exemplos</text>
  <text x="1035" y="420" fill="#b6cfe0" font-family="Menlo, Consolas, monospace" font-size="22">Prompt Hub</text>
  <text x="1035" y="455" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="24">v2 publicado</text>
  <text x="1035" y="525" fill="#b6cfe0" font-family="Menlo, Consolas, monospace" font-size="22">LangSmith</text>
  <text x="1035" y="560" fill="#ffffff" font-family="Menlo, Consolas, monospace" font-size="24">traces publicos</text>

  <text x="120" y="825" fill="#8ea8ba" font-family="Menlo, Consolas, monospace" font-size="18">Artefato visual gerado a partir da execucao final aprovada no LangSmith e do resumo exibido no terminal.</text>
</svg>
