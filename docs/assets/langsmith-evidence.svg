<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Evidencias publicas do LangSmith</title>
  <desc id="desc">Painel visual resumindo o dashboard do projeto, dataset publico de 15 exemplos e tres traces publicos usados como evidencia do entregavel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f6f1"/>
      <stop offset="100%" stop-color="#e9eef7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="980" fill="url(#bg)"/>

  <text x="80" y="95" fill="#0f172a" font-family="Georgia, 'Times New Roman', serif" font-size="40">Evidencias no LangSmith</text>
  <text x="80" y="135" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="24">Projeto aprovado com dataset publico de 15 exemplos e traces compartilhados para inspecao detalhada.</text>

  <rect x="80" y="190" width="1240" height="150" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="245" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28">Dashboard do projeto</text>
  <text x="120" y="287" fill="#1d4ed8" font-family="Menlo, Consolas, monospace" font-size="20">https://smith.langchain.com/projects/mba-ia-desafio-ingestao-busca</text>
  <text x="120" y="320" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Projeto usado na rodada final aprovada. Contem o historico das execucoes e das avaliacoes do prompt v2.</text>

  <rect x="80" y="380" width="1240" height="170" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="120" y="435" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28">Dataset publico para a entrega</text>
  <text x="120" y="477" fill="#1d4ed8" font-family="Menlo, Consolas, monospace" font-size="20">https://smith.langchain.com/public/1d97e095-da67-4067-aeba-62945008e834/d</text>
  <text x="120" y="510" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="20">Dataset limpo criado para o entregavel com exatamente 15 exemplos, espelhando o arquivo datasets/bug_to_user_story.jsonl.</text>
  <text x="120" y="540" fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="20">Status: 15 exemplos visiveis e compartilhados publicamente.</text>

  <text x="80" y="625" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="30">Traces publicos recomendados</text>

  <rect x="80" y="665" width="390" height="210" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="112" y="718" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24">Trace 1</text>
  <text x="112" y="755" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22">Carrinho / botao adicionar</text>
  <text x="112" y="788" fill="#1d4ed8" font-family="Menlo, Consolas, monospace" font-size="16">https://smith.langchain.com/public/4f861540-7cad-44d4-a6f7-dec8adbbdbd3/r</text>
  <text x="112" y="833" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Exemplo simples para inspecionar a cadeia completa de geracao.</text>

  <rect x="505" y="665" width="390" height="210" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="537" y="718" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24">Trace 2</text>
  <text x="537" y="755" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22">Seguranca / autorizacao por role</text>
  <text x="537" y="788" fill="#1d4ed8" font-family="Menlo, Consolas, monospace" font-size="16">https://smith.langchain.com/public/8ce2a055-e9b4-40a3-839c-14a6eef7a9be/r</text>
  <text x="537" y="833" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Exemplo medio com multi-role, OWASP e criterios adicionais para admins.</text>

  <rect x="930" y="665" width="390" height="210" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <text x="962" y="718" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="24">Trace 3</text>
  <text x="962" y="755" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="22">Sync offline / caso complexo</text>
  <text x="962" y="788" fill="#1d4ed8" font-family="Menlo, Consolas, monospace" font-size="16">https://smith.langchain.com/public/bc85dc7d-443a-4b3e-8206-1f831d761766/r</text>
  <text x="962" y="833" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18">Exemplo complexo com conflito, upload, ordenacao e memoria.</text>

  <text x="80" y="930" fill="#64748b" font-family="Arial, Helvetica, sans-serif" font-size="18">Os links publicos acima sao os artefatos principais a serem anexados ou revisados no entregavel final.</text>
</svg>
